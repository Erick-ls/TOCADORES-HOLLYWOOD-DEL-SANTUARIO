<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Contacto - Muebles Elegantes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contacto.css">
    <script defer src="contacto.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <section class="contacto-container">

        <div class="contacto-card">
            <h2>Solicita Más Información</h2>
            <p>Completa el formulario y te atenderemos por WhatsApp.</p>

            <form id="form-contacto">
                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="email" id="correo" placeholder="Correo electrónico" required>
                <input type="text" id="producto" placeholder="Producto de interés" required>
                <textarea id="mensaje" placeholder="Escribe tu mensaje..." required></textarea>

                <button type="submit" class="btn-enviar">
                    Enviar por WhatsApp
                </button>
            </form>

        </div>

    </section>

</body>

</html>
